<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Cyber Buddy Academy</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#080808,#121826);
color:white;
}

.card{
background:#1a1f2e;
border-radius:12px;
padding:20px;
box-shadow:0 0 20px rgba(0,255,224,0.1);
}

</style>
</head>

<body class="p-10">

<h1 class="text-3xl text-cyan-400 mb-8">Cyber Buddy Academy Admin Panel</h1>

<div class="grid grid-cols-1 md:grid-cols-2 gap-10">

<!-- Upload Course -->
<div class="card">

<h2 class="text-xl mb-4 text-cyan-300">Upload New Course</h2>

<form id="courseForm" class="space-y-4">

<input
type="text"
id="title"
placeholder="Course Title"
class="w-full p-3 text-black rounded"
required
>

<textarea
id="description"
placeholder="Course Description"
class="w-full p-3 text-black rounded"
required
></textarea>

<input
type="text"
id="image"
placeholder="Course Thumbnail URL"
class="w-full p-3 text-black rounded"
required
>

<input
type="text"
id="video"
placeholder="Course Video URL (YouTube Embed)"
class="w-full p-3 text-black rounded"
required
>

<button
class="bg-cyan-400 text-black px-6 py-2 rounded font-semibold w-full">
Upload Course
</button>

</form>

<p id="msg" class="mt-3"></p>

</div>

<!-- Course List -->
<div class="card">

<h2 class="text-xl mb-4 text-cyan-300">Existing Courses</h2>

<div id="courseList" class="space-y-4"></div>

</div>

</div>


<script type="module">

/* Firebase Config */

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

const firebaseConfig = {

apiKey:"AIzaSyCLPNGY6w2otiBUGfbjnOM86DYfvh-zt4U",
authDomain:"cyber-buddy-academy.firebaseapp.com",
projectId:"cyber-buddy-academy",
storageBucket:"cyber-buddy-academy.appspot.com",
messagingSenderId:"378058712667",
appId:"1:378058712667:web:88b72bcde024c217dac17e"

};

/* Init */

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);


/* Admin Email */

const ADMIN_EMAIL = "youradmin@email.com";


/* Check Admin */

onAuthStateChanged(auth,(user)=>{

if(!user || user.email !== ADMIN_EMAIL){

alert("Unauthorized Access");

window.location.href="login.html";

}

});


/* Upload Course */

const form = document.getElementById("courseForm");

const msg = document.getElementById("msg");

form.addEventListener("submit",async(e)=>{

e.preventDefault();

const title = document.getElementById("title").value;
const description = document.getElementById("description").value;
const image = document.getElementById("image").value;
const video = document.getElementById("video").value;

try{

await addDoc(collection(db,"courses"),{

title,
description,
image,
video,
createdAt:Date.now()

});

msg.innerText="Course Uploaded Successfully";
msg.style.color="lightgreen";

form.reset();

loadCourses();

}catch(err){

msg.innerText="Error Uploading Course";
msg.style.color="red";

}

});


/* Load Courses */

async function loadCourses(){

const list = document.getElementById("courseList");

list.innerHTML="Loading...";

const snapshot = await getDocs(collection(db,"courses"));

list.innerHTML="";

snapshot.forEach((docu)=>{

const course = docu.data();

const div = document.createElement("div");

div.className="bg-gray-800 p-4 rounded";

div.innerHTML=`

<h3 class="text-cyan-300 font-semibold">${course.title}</h3>

<p class="text-sm text-gray-300 mb-2">${course.description}</p>

<button
data-id="${docu.id}"
class="deleteBtn bg-red-500 px-3 py-1 rounded text-sm">
Delete
</button>

`;

list.appendChild(div);

});

}


/* Delete Course */

document.addEventListener("click",async(e)=>{

if(e.target.classList.contains("deleteBtn")){

const id = e.target.dataset.id;

await deleteDoc(doc(db,"courses",id));

loadCourses();

}

});


/* Initial Load */

loadCourses();


</script>

</body>
</html>
