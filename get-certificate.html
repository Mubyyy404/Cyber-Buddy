<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyber Buddy Academy - Certificate Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0f0f0f,#1a1a2e);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    background:rgba(0,0,0,0.65);
    padding:40px;
    border-radius:20px;
    width:100%;
    max-width:520px;
    text-align:center;
    box-shadow:0 0 30px #00f2ff;
    backdrop-filter:blur(12px);
}

.logo{
    width:120px;
    margin-bottom:15px;
    filter:drop-shadow(0 0 15px #00f2ff);
}

h1{
    color:#00f2ff;
    margin-top:5px;
    margin-bottom:10px;
}

p{
    color:#ccc;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    border-radius:10px;
    border:none;
    outline:none;
    font-size:15px;
    background:#f5f5f5;
    color:#111;
}

.btn{
    width:100%;
    padding:14px;
    margin-top:15px;
    border-radius:10px;
    border:none;
    font-weight:bold;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
    text-decoration:none;
    display:block;
}

.get-btn{
    background:#00f2ff;
    color:black;
}

.get-btn:hover{
    background:#00c3cc;
    transform:scale(1.03);
}

.verify-btn{
    background:#ff9800;
    color:black;
}

.verify-btn:hover{
    background:#e68900;
    transform:scale(1.03);
}

.download-btn{
    display:none;
    background:#00ff88;
    color:black;
}

.download-btn:hover{
    background:#00cc6d;
    transform:scale(1.03);
}

.success{
    color:#00ff88;
    margin-top:15px;
    font-weight:bold;
    font-size:22px;
}

.error{
    color:#ff4b4b;
    margin-top:15px;
    font-weight:bold;
    font-size:20px;
}

.loading{
    color:#00f2ff;
    margin-top:15px;
    font-weight:bold;
    font-size:20px;
}

.cert-details{
    margin-top:20px;
    text-align:left;
    background:rgba(255,255,255,0.06);
    padding:18px;
    border-radius:15px;
    display:none;
}

.cert-details p{
    margin:10px 0;
    color:white;
    font-size:15px;
}

.cert-details span{
    color:#00f2ff;
    font-weight:bold;
}

iframe{
    margin-top:20px;
    width:100%;
    height:700px;
    border-radius:15px;
    border:none;
    display:none;
    background:white;
}

</style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <img
        src="https://raw.githubusercontent.com/Mubyyy404/photo-2/main/mylogo.png"
        class="logo"
        alt="Cyber Buddy Academy Logo"
    >

    <h1>Cyber Buddy Academy</h1>

    <p>Download or Verify Your Certificate</p>

    <!-- INPUT -->
    <input
        type="text"
        id="billNumber"
        placeholder="Enter Certificate ID (CBA-CERT-XXXXXXXX)"
    >

    <!-- GET CERTIFICATE -->
    <button
        class="btn get-btn"
        onclick="getCertificate()"
    >
        Get Certificate
    </button>

    <!-- VERIFY -->
    <button
        class="btn verify-btn"
        onclick="redirectVerify()"
    >
        Verify Certificate
    </button>

    <!-- MESSAGE -->
    <div id="message"></div>

    <!-- DETAILS -->
    <div
        class="cert-details"
        id="certDetails"
    ></div>

    <!-- DOWNLOAD -->
    <a
        id="downloadBtn"
        class="btn download-btn"
        target="_blank"
    >
        Download Certificate
    </a>

    <!-- PDF PREVIEW -->
    <iframe id="pdfViewer"></iframe>

</div>

<script>

let currentCertificate = null;

// GET CERTIFICATE
async function getCertificate(){

    const certId =
        document.getElementById("billNumber").value.trim();

    const message =
        document.getElementById("message");

    const viewer =
        document.getElementById("pdfViewer");

    const downloadBtn =
        document.getElementById("downloadBtn");

    const certDetails =
        document.getElementById("certDetails");

    // RESET
    viewer.style.display = "none";
    viewer.src = "";
    downloadBtn.style.display = "none";
    certDetails.style.display = "none";
    currentCertificate = null;

    // EMPTY CHECK
    if(certId === ""){
        message.innerHTML = `
            <div class='error'>
                Please enter Certificate ID ❌
            </div>
        `;
        return;
    }

    message.innerHTML = `
        <div class='loading'>
            Checking certificate...
        </div>
    `;

    try{

        // FETCH JSON
        const response =
            await fetch("certificates.json");

        const data =
            await response.json();

        // FIND CERTIFICATE BY certId
        const certificate =
            data.certificates.find(
                cert => cert.certId === certId
            );

        // NOT FOUND
        if(!certificate){
            message.innerHTML = `
                <div class='error'>
                    Invalid Certificate ID ❌
                </div>
            `;
            return;
        }

        currentCertificate = certificate;

        // SUCCESS MESSAGE
        message.innerHTML = `
            <div class='success'>
                Certificate Found ✅
            </div>
        `;

        // DETAILS
        certDetails.innerHTML = `
            <p><span>Name:</span> ${certificate.name || "N/A"}</p>
            <p><span>Course:</span> ${certificate.course || "N/A"}</p>
            <p><span>Type:</span> ${certificate.type || "N/A"}</p>
            <p><span>Mode:</span> ${certificate.mode || "N/A"}</p>
            <p><span>Duration:</span> ${certificate.duration || "N/A"}</p>
            <p><span>Issued On:</span> ${certificate.issuedOn || "N/A"}</p>
            <p><span>Certificate ID:</span> ${certificate.certId}</p>
        `;

        certDetails.style.display = "block";

        // PDF DOWNLOAD + PREVIEW
        if(certificate.download){

            const pdfURL = certificate.download;

            // DOWNLOAD BUTTON — direct link to the raw PDF
            downloadBtn.href = pdfURL;
            downloadBtn.style.display = "block";

            // PDF PREVIEW — use Google Docs viewer so it renders inline
            // instead of triggering a browser download
            viewer.src =
                "https://docs.google.com/gview?url=" +
                encodeURIComponent(pdfURL) +
                "&embedded=true";

            viewer.style.display = "block";
        }

    }catch(error){

        console.error(error);

        message.innerHTML = `
            <div class='error'>
                Error loading certificates.json ❌
            </div>
        `;
    }
}

// VERIFY REDIRECT
// Always appends ?certid= so the verify page can auto-fill the field.
// If the JSON has a custom verifyUrl, we use that as the base;
// otherwise we fall back to the default verify page.
function redirectVerify(){

    const certId =
        document.getElementById("billNumber").value.trim();

    // EMPTY CHECK
    if(certId === ""){
        alert("Enter Certificate ID first");
        return;
    }

    let baseUrl;

    if(
        currentCertificate &&
        currentCertificate.verifyUrl
    ){
        // Use the custom URL from JSON as the base
        baseUrl = currentCertificate.verifyUrl;
    }else{
        // Default verify page
        baseUrl =
            "https://mubyyy404.github.io/Cyber-Buddy/verify-certificate.html";
    }

    // Always append ?certid= so the verify page auto-fills the input
    window.location.href =
        baseUrl + "?certid=" + encodeURIComponent(certId);
}

</script>

</body>
</html>
