<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyber Buddy Academy - Certificate Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    background: rgba(0,0,0,0.65);
    padding: 40px;
    border-radius: 20px;
    width: 95%;
    max-width: 520px;
    text-align: center;
    box-shadow: 0 0 30px #00f2ff;
    backdrop-filter: blur(12px);
}

.logo {
    width: 120px;
    margin-bottom: 15px;
    filter: drop-shadow(0 0 15px #00f2ff);
}

h1 {
    color: #00f2ff;
    margin-top: 5px;
}

p {
    color: #ccc;
}

input {
    width: 100%;
    padding: 14px;
    margin-top: 20px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 15px;
}

.btn {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.get-btn {
    background: #00f2ff;
    color: black;
}

.get-btn:hover {
    background: #00c3cc;
    transform: scale(1.05);
}

.verify-btn {
    background: #ff9800;
    color: black;
}

.verify-btn:hover {
    background: #e68900;
    transform: scale(1.05);
}

.download-btn {
    display: none;
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border-radius: 10px;
    background: #00ff88;
    color: black;
    font-weight: bold;
    text-decoration: none;
}

.success {
    color: #00ff88;
    margin-top: 15px;
}

.error {
    color: red;
    margin-top: 15px;
}

.loading {
    color: #00f2ff;
    margin-top: 15px;
}

iframe {
    margin-top: 20px;
    width: 100%;
    height: 420px;
    border-radius: 12px;
    border: none;
    display: none;
}
</style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <img src="https://raw.githubusercontent.com/Mubyyy404/photo-2/main/mylogo.png" class="logo" alt="Cyber Buddy Academy Logo">

    <h1>Cyber Buddy Academy</h1>
    <p>Download or Verify Your Certificate</p>

    <input type="text" id="billNumber" placeholder="Enter Bill Number (CBA-XXXXXXXXXXXX)">

    <!-- Get Certificate Button -->
    <button class="btn get-btn" onclick="getCertificate()">Get Certificate</button>

    <!-- Verify Certificate Redirect Button -->
    <button class="btn verify-btn" onclick="redirectVerify()">Verify Certificate</button>

    <div id="message"></div>

    <!-- Download Button -->
    <a id="downloadBtn" class="download-btn" target="_blank">
        Download Certificate
    </a>

    <!-- PDF Preview -->
    <iframe id="pdfViewer"></iframe>

</div>

<script>
async function getCertificate() {
    const bill = document.getElementById("billNumber").value.trim();
    const message = document.getElementById("message");
    const viewer = document.getElementById("pdfViewer");
    const downloadBtn = document.getElementById("downloadBtn");

    viewer.style.display = "none";
    downloadBtn.style.display = "none";
    message.innerHTML = "<div class='loading'>Checking certificate...</div>";

    try {
        const response = await fetch("certificates_download.json");
        const data = await response.json();

        if(data[bill]) {
            const pdfURL = data[bill];

            message.innerHTML = "<div class='success'>Certificate Found ✅</div>";

            viewer.src = "https://docs.google.com/gview?url=" + encodeURIComponent(pdfURL) + "&embedded=true";
            viewer.style.display = "block";

            downloadBtn.href = pdfURL;
            downloadBtn.style.display = "block";
        } else {
            message.innerHTML = "<div class='error'>Invalid Bill Number ❌</div>";
        }

    } catch (error) {
        message.innerHTML = "<div class='error'>Error loading certificates.</div>";
    }
}

function redirectVerify() {
    window.location.href = "https://mubyyy404.github.io/Cyber-Buddy/verify-certificate.html";
}
</script>

</body>
</html>
