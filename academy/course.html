<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Courses — Cyber Buddy Academy</title>
<link rel="icon" href="https://raw.githubusercontent.com/Mubyyy404/Cyber-Buddy/main/mylogo.png">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.6.0/css/all.min.css">
<style>:root{--c:#06b6d4;--bg:#0b1220;--bg2:#0d1829;--bdr:rgba(6,182,212,.12);--tx:#e6f6f8;--dim:#64748b}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}nav{background:rgba(11,18,32,.95);border-bottom:1px solid var(--bdr);padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;backdrop-filter:blur(12px)}.nav-logo{display:flex;align-items:center;gap:9px;font-weight:800;font-size:.95rem;color:var(--c)}.nav-logo img{width:30px;height:30px;border-radius:7px}.nav-links{display:flex;align-items:center;gap:14px}.nav-links a{font-size:.8rem;font-weight:600;color:var(--dim);text-decoration:none;transition:color .2s;display:flex;align-items:center;gap:4px}.nav-links a:hover,.nav-links a.on{color:var(--c)}.nav-links .link-text{display:inline}@media(max-width:480px){.nav-links .link-text{display:none}}.page{max-width:1100px;margin:0 auto;padding:28px 16px}.cc{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:12px;overflow:hidden;transition:transform .25s,border-color .25s,box-shadow .25s;display:flex;flex-direction:column}.cc:hover{transform:translateY(-4px);border-color:rgba(6,182,212,.35);box-shadow:0 14px 36px rgba(0,0,0,.4)}.cc-img{overflow:hidden;flex-shrink:0}.cc-img img{width:100%;height:160px;object-fit:cover;display:block;transition:transform .4s}.cc:hover .cc-img img{transform:scale(1.05)}.cc-body{padding:14px;flex:1;display:flex;flex-direction:column}.prog-track{height:4px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden}.prog-fill{height:100%;background:linear-gradient(90deg,var(--c),#0ea5e9);border-radius:99px;transition:width .5s}.courses-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}@media(max-width:800px){.courses-grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:480px){.courses-grid{grid-template-columns:1fr}}.skeleton{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:12px;overflow:hidden}.sk-img{height:160px;background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.07) 50%,rgba(255,255,255,.04) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}.sk-body{padding:14px}.sk-line{height:10px;border-radius:5px;background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.07) 50%,rgba(255,255,255,.04) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;margin-bottom:8px}@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}</style>
</head>
<body> <nav> <div class="nav-logo"> <img src="https://raw.githubusercontent.com/Mubyyy404/Cyber-Buddy/refs/heads/main/mylogo.png" alt=""> <span>Cyber<span style="color:#fff;">Buddy</span></span> </div> <div class="nav-links"> <a href="dashboard.html"><i class="fas fa-th-large"></i><span class="link-text">Dashboard</span></a> <a href="course.html" class="on"><i class="fas fa-book-open"></i><span class="link-text">My Courses</span></a> <button id="logoutBtn" style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#f87171;padding:7px 12px;border-radius:7px;font-family:'Poppins',sans-serif;font-size:.76rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s;" onmouseover="this.style.background='rgba(239,68,68,.2)'" onmouseout="this.style.background='rgba(239,68,68,.1)'"> <i class="fas fa-sign-out-alt"></i><span class="link-text">Logout</span> </button> </div>
</nav> <div class="page"> <div style="margin-bottom:20px;"> <h1 style="font-size:1.35rem;font-weight:800;color:var(--c);">My Courses</h1> <p style="font-size:.78rem;color:var(--dim);margin-top:4px;">Your enrolled courses. Click any course to continue learning.</p> </div> <div style="position:relative;max-width:380px;margin-bottom:20px;"> <i class="fas fa-search" style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:.75rem;"></i> <input id="searchInput" placeholder="Search your courses..." style="width:100%;padding:9px 12px 9px 32px;background:rgba(255,255,255,.04);border:1.5px solid rgba(6,182,212,.14);border-radius:8px;color:var(--tx);font-family:'Poppins',sans-serif;font-size:.82rem;outline:none;transition:border-color .2s;" onfocus="this.style.borderColor='#06b6d4'" onblur="this.style.borderColor='rgba(6,182,212,.14)'"> </div> <div id="loading" class="courses-grid">
 ${[1,2,3].map(()=>`<div class="skeleton"><div class="sk-img"></div><div class="sk-body"><div class="sk-line" style="width:40%;"></div><div class="sk-line" style="width:85%;"></div><div class="sk-line" style="width:60%;"></div></div></div>`).join('')}
 </div> <div id="empty" style="display:none;text-align:center;padding:56px 20px;"> <div style="width:74px;height:74px;border-radius:50%;background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.2);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;"> <i class="fas fa-lock" style="color:var(--c);font-size:1.4rem;"></i> </div> <h3 style="font-size:1.05rem;font-weight:700;margin-bottom:8px;">No Courses Yet</h3> <p style="color:var(--dim);font-size:.82rem;max-width:280px;margin:0 auto 18px;line-height:1.6;">You haven't been enrolled in any courses yet. Contact your admin to get access.</p> <a href="dashboard.html" style="display:inline-block;padding:10px 22px;border-radius:8px;background:linear-gradient(135deg,#06b6d4,#0ea5e9);color:#042028;font-weight:700;font-size:.82rem;text-decoration:none;">Browse All Courses</a> </div> <div id="grid" class="courses-grid" style="display:none;"></div> </div> <script type="module">import { auth, db } from "./js/firebase.js";
import { collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
let allMine = [];
onAuthStateChanged(auth, async user => {
if (!user) { window.location = 'login.html'; return; }
const userSnap = await getDoc(doc(db, 'users', user.uid));
const udata = userSnap?.data();
const purchased = udata?.purchasedCourses || [];
const coursesSnap = await getDocs(collection(db, 'courses'));
allMine = [];
coursesSnap.forEach(c => {
if (purchased.includes(c.id)) allMine.push({ id: c.id, ...c.data() });
});
document.getElementById('loading').style.display = 'none';
if (!allMine.length) {
document.getElementById('empty').style.display = 'block';
return;
}
renderGrid(allMine);
});
function getProgress(courseId, totalLessons) {
if (!totalLessons) return 0;
let completed = 0;
for (let i = 0; i < totalLessons; i++) {
if (localStorage.getItem(`cb_done_${courseId}_${i}`) === '1') completed++;
}
const aggregate = parseInt(localStorage.getItem(`cb_prog_${courseId}`) || '0');
const fromLessons = totalLessons > 0 ? Math.round((completed / totalLessons) * 100) : 0;
return Math.min(100, Math.max(fromLessons, aggregate));
}
function renderGrid(courses) {
const grid = document.getElementById('grid');
grid.style.display = 'grid';
grid.innerHTML = courses.map(c => {
const lessonCount = c.lessons?.length || 0;
const prog = getProgress(c.id, lessonCount);
const isComplete = prog >= 100;
return `
<div class="cc">
<div class="cc-img"><img src="${c.image || 'https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=400&q=70'}" alt="${c.title}" loading="lazy"></div>
<div class="cc-body">
<div style="display:flex;align-items:center;gap:6px;margin-bottom:7px;">
<span style="font-size:.63rem;font-weight:700;color:${isComplete?'#f59e0b':'#22c55e'};background:${isComplete?'rgba(245,158,11,.1)':'rgba(34,197,94,.1)'};padding:2px 7px;border-radius:99px;border:1px solid ${isComplete?'rgba(245,158,11,.2)':'rgba(34,197,94,.2)'};">${isComplete?'✓ Completed':'Enrolled'}</span>
</div>
<h4 style="font-size:.88rem;font-weight:700;margin-bottom:4px;line-height:1.35;flex:1;">${c.title}</h4>
<p style="font-size:.72rem;color:var(--dim);margin-bottom:10px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.5;">${c.description || ''}</p>
${lessonCount ? `<p style="font-size:.68rem;color:var(--dim);margin-bottom:8px;"><i class="fas fa-list" style="margin-right:3px;color:var(--c);"></i>${lessonCount} lesson${lessonCount!==1?'s':''}</p>` : ''}
<div style="margin-bottom:12px;">
<div style="display:flex;justify-content:space-between;font-size:.65rem;color:var(--dim);margin-bottom:4px;">
<span>Progress</span>
<span id="pr-${c.id}" style="color:${prog>=100?'#f59e0b':prog>0?'var(--c)':'var(--dim)'};">${prog}%</span>
</div>
<div class="prog-track"><div class="prog-fill" id="pf-${c.id}" style="width:${prog}%;${prog>=100?'background:linear-gradient(90deg,#f59e0b,#fbbf24);':''}"></div></div>
</div>
<a href="web-pentesting.html?id=${c.id}" style="display:block;text-align:center;padding:9px;border-radius:8px;background:linear-gradient(135deg,#06b6d4,#0ea5e9);color:#042028;font-weight:700;font-size:.78rem;text-decoration:none;margin-top:auto;">
<i class="fas fa-${isComplete?'redo':'play'}" style="margin-right:4px;"></i>${isComplete?'Review Course':'Continue Learning'}
</a>
</div>
</div>`;
}).join('');
}
document.getElementById('searchInput').addEventListener('input', function() {
const q = this.value.toLowerCase();
renderGrid(q ? allMine.filter(c => c.title.toLowerCase().includes(q)) : allMine);
});
document.getElementById('logoutBtn').onclick = async () => {
try {
await signOut(auth);
window.location = 'login.html';
} catch (e) {
console.error('Logout error', e);
window.location = 'login.html';
}
};</script>
</body>
</html>
